<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gita Quiz — Gita Mentor</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="page-wrapper">

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar-brand" href="home.html">
      <span class="om">ॐ</span>
      <span>Gita Mentor</span>
    </a>
    <div class="navbar-right">
      <span class="nav-username" id="nav-username"></span>
      <a class="btn-nav" href="home.html">← Home</a>
      <button class="btn-nav" id="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content">

    <h2 class="section-heading">📿 Bhagavad Gita Quiz</h2>
    <p class="section-subtext" id="quiz-subtitle">
      5 questions based on your mentorship journey. Test your understanding.
    </p>

    <!-- Loading -->
    <div class="loading-spinner" id="quiz-loading">
      <div>
        <span class="spinner-dot"></span>
        <span class="spinner-dot"></span>
        <span class="spinner-dot"></span>
      </div>
      <p style="margin-top:12px;">Preparing your sacred quiz…</p>
    </div>

    <!-- Quiz Container -->
    <div class="quiz-container" id="quiz-container" style="display:none;">

      <!-- Progress -->
      <div class="quiz-progress">
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span class="quiz-progress-text" id="progress-text">1 / 5</span>
      </div>

      <!-- Question -->
      <div class="quiz-question-num" id="question-num">Question 1</div>
      <div class="quiz-question-text" id="question-text"></div>

      <!-- Options -->
      <div class="quiz-options" id="quiz-options"></div>

      <!-- Navigation -->
      <div class="quiz-nav">
        <div id="answer-feedback" style="
          font-style:italic;
          color: var(--text-soft);
          font-size:0.95rem;
          min-height:24px;
        "></div>
        <button class="btn btn-primary" id="next-btn"
          onclick="nextQuestion()" style="display:none; width:auto;">
          Next →
        </button>
      </div>

      <!-- Score Card (inside quiz container) -->
      <div class="score-card" id="score-card">

        <div class="score-circle">
          <span class="score-number" id="score-number">0</span>
          <span class="score-total">out of 5</span>
        </div>

        <div class="score-message" id="score-message">Well Done!</div>
        <p class="score-verse" id="score-verse"></p>

        <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:1.5rem;">
          <button class="btn btn-primary" onclick="restartQuiz()" style="width:auto;">
            🔄 &nbsp; Retry Quiz
          </button>
          <a href="mentor.html" class="btn btn-dark" style="width:auto; text-decoration:none;">
            🪷 &nbsp; Ask Krishna
          </a>
          <a href="home.html" class="btn btn-outline-gold" style="width:auto; text-decoration:none;">
            ← Home
          </a>
        </div>
      </div>

    </div>

  </main>

  <footer class="footer">
    <span>ॐ</span> Bhagavad Gita Mentor &nbsp;|&nbsp; Built with devotion &nbsp;|&nbsp; <span>ॐ</span>
  </footer>

</div>

<script src="../js/utils.js"></script>
<script>
  requireAuth();
  initNavbar();

  // ── State ─────────────────────────────────────────────────
  let questions      = [];
  let currentIndex   = 0;
  let score          = 0;
  let answered       = false;

  // ── Load Quiz ─────────────────────────────────────────────
  async function loadQuiz() {
    const userId = Session.getUserId();
    document.getElementById('quiz-loading').classList.add('show');
    document.getElementById('quiz-container').style.display = 'none';

    try {
      questions = await apiGet(`/quiz?userId=${userId}`);

      if (!questions || questions.length === 0) {
        document.getElementById('quiz-loading').classList.remove('show');
        document.getElementById('quiz-subtitle').textContent =
          'No quiz questions found. Please ensure the database is seeded.';
        return;
      }

      currentIndex = 0;
      score        = 0;
      answered     = false;

      document.getElementById('quiz-loading').classList.remove('show');
      document.getElementById('quiz-container').style.display = 'block';
      document.getElementById('score-card').classList.remove('show');

      renderQuestion();

    } catch (err) {
      document.getElementById('quiz-loading').classList.remove('show');
      document.getElementById('quiz-subtitle').textContent =
        'Could not load quiz. Please ensure the backend is running.';
    }
  }

  // ── Render current question ───────────────────────────────
  function renderQuestion() {
    answered = false;
    const q  = questions[currentIndex];
    const n  = currentIndex + 1;
    const total = questions.length;

    // Progress
    document.getElementById('progress-fill').style.width = ((n - 1) / total * 100) + '%';
    document.getElementById('progress-text').textContent = n + ' / ' + total;
    document.getElementById('question-num').textContent  = 'Question ' + n;
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('answer-feedback').textContent = '';
    document.getElementById('next-btn').style.display   = 'none';

    const optionsEl = document.getElementById('quiz-options');
    optionsEl.innerHTML = '';

    const opts = [
      { letter: 'A', text: q.optionA },
      { letter: 'B', text: q.optionB },
      { letter: 'C', text: q.optionC },
      { letter: 'D', text: q.optionD }
    ];

    opts.forEach(opt => {
      const div = document.createElement('div');
      div.className = 'quiz-option';
      div.innerHTML = `
        <span class="option-letter">${opt.letter}</span>
        <span>${opt.text}</span>
      `;
      div.addEventListener('click', () => selectOption(div, opt.letter, q.correctAnswer));
      optionsEl.appendChild(div);
    });
  }

  // ── Handle option selection ───────────────────────────────
  function selectOption(selectedEl, chosen, correct) {
    if (answered) return;
    answered = true;

    const allOptions = document.querySelectorAll('.quiz-option');

    allOptions.forEach(el => {
      const letter = el.querySelector('.option-letter').textContent;
      if (letter === correct) {
        el.classList.add('correct');
      } else if (letter === chosen && chosen !== correct) {
        el.classList.add('wrong');
      }
    });

    const feedback = document.getElementById('answer-feedback');
    if (chosen === correct) {
      score++;
      feedback.textContent  = '✅ Correct! Well done, O Seeker.';
      feedback.style.color  = 'var(--success)';
    } else {
      feedback.textContent  = `❌ The correct answer is: ${correct}`;
      feedback.style.color  = 'var(--error)';
    }

    // Show next / finish button
    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'inline-flex';

    const isLast = currentIndex === questions.length - 1;
    nextBtn.textContent = isLast ? 'See Results 🏆' : 'Next →';
  }

  // ── Next question ─────────────────────────────────────────
  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= questions.length) {
      showScore();
    } else {
      renderQuestion();
    }
  }

  // ── Show final score ──────────────────────────────────────
  function showScore() {
    // Hide question area
    document.getElementById('question-num').style.display  = 'none';
    document.getElementById('question-text').style.display = 'none';
    document.getElementById('quiz-options').style.display  = 'none';
    document.getElementById('quiz-nav').style.display      = 'none'; // will hide controls

    // Update progress to 100%
    document.getElementById('progress-fill').style.width   = '100%';
    document.getElementById('progress-text').textContent   = 'Complete!';

    const total = questions.length;
    document.getElementById('score-number').textContent = score;

    // Message based on score
    let message, verse;
    if (score === total) {
      message = '🌟 Perfect Score! Jai Shri Krishna!';
      verse   = '"He who has conquered himself is the greatest warrior." — Gita 6.7';
    } else if (score >= Math.ceil(total * 0.7)) {
      message = '🙏 Excellent! Your wisdom grows, O Seeker.';
      verse   = '"A little knowledge of Yoga frees one from great fear." — Gita 2.40';
    } else if (score >= Math.ceil(total * 0.4)) {
      message = '🌸 Good Effort! Keep seeking, keep learning.';
      verse   = '"Even if you are the most sinful of sinners, you shall cross over all sin by the boat of knowledge." — Gita 4.36';
    } else {
      message = '🌱 The journey begins. Study the Gita more.';
      verse   = '"Let right deeds be thy motive, not the fruit that comes from them." — Gita 2.47';
    }

    document.getElementById('score-message').textContent = message;
    document.getElementById('score-verse').textContent   = verse;
    document.getElementById('score-card').classList.add('show');
    document.getElementById('score-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ── Restart ───────────────────────────────────────────────
  function restartQuiz() {
    document.getElementById('question-num').style.display  = '';
    document.getElementById('question-text').style.display = '';
    document.getElementById('quiz-options').style.display  = '';
    const navEl = document.getElementById('quiz-nav');
    if (navEl) navEl.style.display = '';
    document.getElementById('score-card').classList.remove('show');
    loadQuiz();
  }

  // ── Boot ──────────────────────────────────────────────────
  loadQuiz();
</script>
</body>
</html>
