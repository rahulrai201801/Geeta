<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gita Mentor</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="om-big">ॐ</span>
      <h1>Gita Mentor</h1>
      <p>Wisdom of the Bhagavad Gita</p>
    </div>

    <div id="login-alert" class="alert"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your name" autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">
      🙏 &nbsp; Enter the Ashram
    </button>

    <div class="auth-switch">
      New devotee? <a href="register.html">Create account</a>
    </div>

  </div>
</div>

<script src="../js/utils.js"></script>
<script>
  // If already logged in, redirect home
  if (Session.isLoggedIn()) window.location.href = 'home.html';

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');

    if (!username || !password) {
      showAlert('login-alert', 'Please enter both username and password.', 'error');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Seeking wisdom…';

    try {
      const data = await apiPost('/login', { username, password });

      if (data.success) {
        Session.save(data.userId, data.username);
        showAlert('login-alert', data.message, 'success');
        setTimeout(() => window.location.href = 'home.html', 800);
      } else {
        showAlert('login-alert', data.message, 'error');
      }
    } catch (err) {
      showAlert('login-alert', 'Cannot connect to server. Please ensure the backend is running.', 'error');
    } finally {
      btn.disabled    = false;
      btn.innerHTML   = '🙏 &nbsp; Enter the Ashram';
    }
  }
</script>
</body>
</html>
